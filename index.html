<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Fazenda JS</title>

<link rel="manifest" href="manifest.json" />

<meta name="theme-color" content="#16a34a"/>

<link rel="stylesheet"
href="./assets/css/style.css"/>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header class="topbar">

<div class="logo-area">

<div class="logo-box">
🐄
</div>

<div>
<h1>Fazenda JS</h1>
<span>Gestão Inteligente v12</span>
</div>

</div>

<div class="top-actions">

<button class="icon-btn">🌙</button>

<button class="icon-btn">☁️</button>

<button class="icon-btn">⬇️</button>

<button class="pdf-btn">PDF</button>

</div>

</header>

<main class="container-app">

<section class="glass-card">

<input
id="numeroMatriz"
type="text"
placeholder="DIGITE O NÚMERO OU NOME..."
class="input-main"
/>

<input
id="loteMatriz"
type="text"
placeholder="Lote (Opcional)"
class="input-main"
/>

<button
id="btnCadastrar"
class="btn-main"
>
➕ Cadastrar Matriz
</button>

</section>

<section class="glass-card filtro-card">

<select
id="filtroLote"
class="select-main"
>
<option value="todos">
Todos os lotes
</option>
</select>

<button
onclick="renderizarMatrizes()"
class="btn-clear"
>
Limpar
</button>

</section>

<section class="stats-grid">

<div class="stat-card">
<h2 id="totalBadge">0</h2>
<p>TOTAL</p>
</div>

<div class="stat-card">
<h2
id="prenhaBadge"
class="green"
>
0
</h2>
<p>PRENHAS</p>
</div>

<div class="stat-card">
<h2
id="vaziaBadge"
class="red"
>
0
</h2>
<p>VAZIAS</p>
</div>

</section>

<section
id="listaMatrizes"
class="lista-matrizes"
>
</section>

</main>

<nav class="bottom-nav">

<button class="active">
🏠
<span>Início</span>
</button>

<button>
📊
<span>Relatórios</span>
</button>

<button>
☁️
<span>Sync</span>
</button>

<button>
⚙️
<span>Config</span>
</button>

</nav>

<script src="./assets/js/app.js"></script>

</body>
</html>
