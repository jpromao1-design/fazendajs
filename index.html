<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Fazenda JS v11</title>

<meta name="theme-color" content="#15803d" />

<link rel="manifest" href="manifest.json" />

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
radial-gradient(circle at left, rgba(34,197,94,.15), transparent 25%),
linear-gradient(to right,#010617,#04113b);

font-family:Arial, Helvetica, sans-serif;
color:white;
min-height:100vh;
padding-bottom:120px;

}

header{

background:linear-gradient(to right,#166534,#15803d);

padding:16px 20px;

display:flex;
justify-content:space-between;
align-items:center;

box-shadow:0 2px 10px rgba(0,0,0,.4);

}

.logo{

display:flex;
align-items:center;
gap:14px;

}

.logo h1{

font-size:24px;
font-weight:800;

}

.logo span{

font-size:14px;
opacity:.8;

}

.top-actions{

display:flex;
gap:12px;

}

.top-btn{

width:48px;
height:48px;

border:none;
border-radius:14px;

background:rgba(255,255,255,.12);

color:white;

font-size:20px;

cursor:pointer;

transition:.2s;

}

.top-btn:hover{

transform:scale(1.05);

background:rgba(255,255,255,.2);

}

.pdf-btn{

background:white;
color:#166534;
font-weight:bold;
padding:0 22px;
width:auto;

}

.container{

max-width:720px;
margin:28px auto;
padding:0 16px;

}

.card{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

border-radius:28px;

padding:18px;

margin-bottom:24px;

box-shadow:0 8px 30px rgba(0,0,0,.3);

}

.card-title{

text-align:center;

font-size:18px;
font-weight:700;

margin-bottom:18px;

}

.input{

width:100%;

height:72px;

border:none;
outline:none;

background:rgba(255,255,255,.05);

border-radius:22px;

padding:0 22px;

font-size:20px;
font-weight:700;

color:white;

margin-bottom:18px;

border:1px solid rgba(255,255,255,.08);

}

.input::placeholder{

color:rgba(255,255,255,.5);

}

.btn-main{

width:100%;

height:74px;

border:none;
border-radius:24px;

background:linear-gradient(to right,#16a34a,#22c55e);

color:white;

font-size:18px;
font-weight:800;

cursor:pointer;

transition:.2s;

}

.btn-main:hover{

transform:scale(1.01);

}

.filtro-area{

display:flex;
gap:12px;

}

.select{

flex:1;

height:60px;

background:rgba(255,255,255,.05);

border:none;
outline:none;

border-radius:20px;

padding:0 18px;

color:white;

font-size:16px;

border:1px solid rgba(255,255,255,.08);

}

.btn-limpar{

width:120px;

border:none;
border-radius:20px;

background:#374151;

color:white;

font-size:18px;
font-weight:700;

cursor:pointer;

}

.stats{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;

margin-bottom:26px;

}

.stat{

background:rgba(255,255,255,.05);

border-radius:28px;

padding:28px 10px;

text-align:center;

border:1px solid rgba(255,255,255,.08);

}

.stat-num{

font-size:54px;
font-weight:900;

}

.stat-label{

margin-top:8px;
font-size:16px;
opacity:.7;

font-weight:700;

}

.branco{

color:white;

}

.verde{

color:#4ade80;

}

.vermelho{

color:#f87171;

}

.lista{

display:flex;
flex-direction:column;
gap:18px;

}

.matriz{

background:rgba(255,255,255,.05);

border-radius:24px;

padding:18px;

border:1px solid rgba(255,255,255,.08);

}

.topo-matriz{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:16px;

}

.numero{

font-size:30px;
font-weight:900;

}

.status{

padding:10px 18px;

border-radius:999px;

font-size:14px;
font-weight:800;

}

.prenha{

background:#14532d;
color:#4ade80;

}

.vazia{

background:#7f1d1d;
color:#f87171;

}

.info{

opacity:.8;
margin-bottom:16px;

}

.botoes{

display:flex;
gap:10px;

}

.btn-status{

flex:1;

height:48px;

border:none;
border-radius:16px;

cursor:pointer;

font-weight:700;

}

.btn-prenha{

background:#14532d;
color:#4ade80;

}

.btn-vazia{

background:#7f1d1d;
color:#f87171;

}

.btn-excluir{

background:#374151;
color:white;

}

.bottom-nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:86px;

background:rgba(0,0,0,.45);

backdrop-filter:blur(14px);

display:flex;
justify-content:space-around;
align-items:center;

border-top:1px solid rgba(255,255,255,.08);

}

.nav-item{

display:flex;
flex-direction:column;
align-items:center;
gap:6px;

font-size:13px;

opacity:.7;

}

.nav-item i{

font-size:22px;

}

.active{

color:#4ade80;
opacity:1;

}

.nenhuma{

text-align:center;
padding:40px 0;
opacity:.6;
font-style:italic;

}

@media(max-width:700px){

.stats{

grid-template-columns:1fr;

}

.filtro-area{

flex-direction:column;

}

.btn-limpar{

width:100%;
height:60px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

<div style="font-size:28px;">🐄</div>

<div>

<h1>Fazenda JS <span>v11</span></h1>

<span>Gestão Inteligente</span>

</div>

</div>

<div class="top-actions">

<button class="top-btn">
<i class="fa-solid fa-moon"></i>
</button>

<button class="top-btn">
<i class="fa-solid fa-cloud-arrow-up"></i>
</button>

<button class="top-btn">
<i class="fa-solid fa-download"></i>
</button>

<button class="top-btn pdf-btn">
PDF
</button>

</div>

</header>

<div class="container">

<div class="card">

<div class="card-title">
Buscar ou Cadastrar Matriz
</div>

<input
id="inputBusca"
class="input"
placeholder="DIGITE O NÚMERO OU NOME..."
/>

<input
id="inputLote"
class="input"
placeholder="Lote (Opcional)"
/>

<button
id="btnCadastrar"
class="btn-main"
>

<i class="fa-solid fa-plus"></i>

Cadastrar Matriz

</button>

</div>

<div class="card">

<div class="filtro-area">

<select
id="filtroLote"
class="select"
>

<option value="">
Todos os lotes
</option>

</select>

<button
id="btnLimpar"
class="btn-limpar"
>

Limpar

</button>

</div>

</div>

<div class="stats">

<div class="stat">

<div
id="totalMatrizes"
class="stat-num branco"
>

0

</div>

<div class="stat-label">
TOTAL
</div>

</div>

<div class="stat">

<div
id="totalPrenhas"
class="stat-num verde"
>

0

</div>

<div class="stat-label">
PRENHAS
</div>

</div>

<div class="stat">

<div
id="totalVazias"
class="stat-num vermelho"
>

0

</div>

<div class="stat-label">
VAZIAS
</div>

</div>

</div>

<div
id="listaMatrizes"
class="lista"
>

<div class="nenhuma">

Nenhuma matriz cadastrada.

</div>

</div>

</div>

<nav class="bottom-nav">

<div class="nav-item active">

<i class="fa-solid fa-house"></i>

<span>Início</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-chart-column"></i>

<span>Relatórios</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-cloud"></i>

<span>Sync</span>

</div>

<div class="nav-item">

<i class="fa-solid fa-gear"></i>

<span>Config</span>

</div>

</nav>

<script src="./assets/js/app.js"></script>

</body>
</html>
