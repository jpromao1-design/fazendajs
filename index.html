<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="theme-color" content="#16a34a">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="mobile-web-app-capable" content="yes">

    <title>FazendaJS</title>

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="bg-gray-100 text-gray-900 font-sans min-h-screen transition-colors">

    <!-- ELEMENTOS OBRIGATÓRIOS -->

    <div id="toast"></div>

    <datalist id="opcoesLotes"></datalist>

    <div id="painelLote" class="hidden"></div>

    <button id="btnVoltar" class="hidden"></button>

    <div id="acoesHeader"></div>

    <h1 id="tituloHeader" class="hidden"></h1>

    <div id="tela-perfil" class="hidden"></div>

    <div id="perfilHistorico" class="hidden"></div>

    <div id="perfilUltimoStatus" class="hidden"></div>

    <div id="perfilLoteBadge" class="hidden"></div>

    <input id="perfilLote" class="hidden">

    <input id="perfilBrincoAtual" class="hidden">

    <div id="listaLogs" class="hidden"></div>

    <div id="painelLogs" class="hidden"></div>

    <i id="iconeSetaLogs" class="hidden"></i>

    <i id="iconeSetaDiag" class="hidden"></i>

    <div id="formDiagnostico" class="hidden"></div>

    <input id="partoData" class="hidden">

    <input id="partoSexo" class="hidden">

    <input id="partoObs" class="hidden">

    <input id="diagAno" class="hidden">

    <input id="diagSituacao" class="hidden">

    <input id="diagObs" class="hidden">

    <input id="inputImportar" type="file" class="hidden">

    <span id="numNovoBrinco" class="hidden"></span>

    <input id="novoLote" class="hidden">

    <i id="iconeTema" class="hidden"></i>

    <!-- HEADER -->

    <header
        class="app-header bg-jsgreen-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">

        <div class="flex items-center gap-3">

            <div
                class="w-14 h-14 rounded-2xl bg-green-600 flex items-center justify-center shadow-lg">

                <i class="fa-solid fa-cow text-2xl"></i>

            </div>

            <div>

                <h1 class="text-4xl font-black leading-none">
                    Fazenda JS
                </h1>

                <span class="text-sm opacity-70">
                    Gestão Inteligente de Matrizes v11
                </span>

            </div>

        </div>

        <div class="flex items-center gap-3">

            <button onclick="alternarTema()" class="header-btn">
                <i class="fa-solid fa-moon"></i>
            </button>

            <button onclick="exportarBackup()" class="header-btn">
                <i class="fa-solid fa-download"></i>
            </button>

            <button onclick="gerarPDFGeral()" class="header-btn">
                <i class="fa-solid fa-file-pdf"></i>
                PDF
            </button>

        </div>

    </header>

    <!-- MAIN -->

    <main id="tela-lista" class="max-w-5xl mx-auto p-5">

        <!-- BUSCA -->

        <section class="glass-card p-8 mb-8">

            <h2 class="text-5xl font-black text-center mb-8">

                Buscar ou Cadastrar Matriz

            </h2>

            <div class="space-y-5">

                <input
                    type="text"
                    id="buscaBrinco"
                    oninput="onBuscaInput()"
                    class="input-app"
                    placeholder="DIGITE O NÚMERO OU NOME..."
                    autocomplete="off">

                <button
                    id="btnCadastrarNovo"
                    onclick="cadastrarMatrizRapido()"
                    class="btn-app-green">

                    <i class="fa-solid fa-plus"></i>

                    Cadastrar Matriz

                </button>

            </div>

        </section>

        <!-- FILTRO -->

        <section class="glass-card p-5 mb-8">

            <label class="block text-2xl font-bold mb-4">

                Filtrar por lote

            </label>

            <div class="flex gap-3">

                <select
                    id="filtroLote"
                    onchange="filtrarMatrizes()"
                    class="input-app">

                    <option value="">

                        Todos os lotes

                    </option>

                </select>

                <button
                    onclick="limparFiltros()"
                    class="btn-app-gray">

                    Limpar

                </button>

            </div>

        </section>

        <!-- RESUMO -->

        <div
            id="resumoPlantel"
            class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">

        </div>

        <!-- LISTA -->

        <ul
            id="listaContatos"
            class="space-y-5 pb-24">

        </ul>

    </main>

    <!-- SCRIPT -->

    <script src="assets/js/app.js"></script>

</body>

</html>
