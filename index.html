<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>FazendaJS</title>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body class="bg-gray-100 text-gray-900 font-sans min-h-screen transition-colors">

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- DATALIST -->
    <datalist id="opcoesLotes"></datalist>

    <!-- HEADER -->
    <header class="app-header bg-jsgreen-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">

        <div class="flex items-center gap-3">
            <div class="text-3xl">🐄</div>

            <div>
                <h1 class="text-3xl font-black leading-none">
                    Fazenda JS
                </h1>

                <span class="text-sm opacity-80">
                    v11
                </span>
            </div>
        </div>

        <div class="flex items-center gap-3">

            <button id="btnTema"
                class="btn-circle"
                onclick="alternarTema()">
                🌙
            </button>

            <button class="btn-circle"
                onclick="exportarBackup()">
                ⬇️
            </button>

            <button class="btn-circle"
                onclick="importarBackup()">
                ⬆️
            </button>

            <button class="btn-pdf"
                onclick="gerarPDFPlantel()">
                PDF
            </button>

        </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-xl mx-auto p-4 mt-2">

        <!-- STATUS -->
        <div class="flex justify-end mb-4">
            <div class="status-badge">
                💾 LocalStorage ativo
            </div>
        </div>

        <!-- CARD BUSCA -->
        <section class="card-app">

            <h2 class="titulo-card">
                Buscar ou Cadastrar Matriz
            </h2>

            <input
                id="buscaBrinco"
                type="text"
                placeholder="DIGITE O NÚMERO OU NOME..."
                class="input-app"
                oninput="onBuscaInput()"
            />

            <button
                class="btn-primary"
                onclick="cadastrarMatrizRapido()">
                + Cadastrar Matriz
            </button>

        </section>

        <!-- FILTROS -->
        <section class="card-app mt-5">

            <h3 class="text-xl font-bold mb-3">
                Filtrar por lote
            </h3>

            <div class="flex gap-3">

                <select
                    id="filtroLote"
                    class="input-app flex-1"
                    onchange="filtrarMatrizes()">

                    <option value="">
                        Todos os lotes
                    </option>

                </select>

                <button
                    class="btn-secondary"
                    onclick="limparFiltros()">
                    Limpar
                </button>

            </div>

        </section>

        <!-- RESUMO -->
        <section class="grid grid-cols-3 gap-4 mt-6">

            <div class="card-resumo">
                <div
                    id="totalMatrizes"
                    class="numero-branco">
                    0
                </div>

                <div class="label-resumo">
                    TOTAL
                </div>
            </div>

            <div class="card-resumo">
                <div
                    id="totalPrenhas"
                    class="numero-verde">
                    0
                </div>

                <div class="label-resumo">
                    PRENHAS
                </div>
            </div>

            <div class="card-resumo">
                <div
                    id="totalVazias"
                    class="numero-vermelho">
                    0
                </div>

                <div class="label-resumo">
                    VAZIAS
                </div>
            </div>

        </section>

        <!-- RESUMO PLANTEL -->
        <div id="resumoPlantel"></div>

        <!-- LISTA -->
        <ul
            id="listaContatos"
            class="mt-6 space-y-4">
        </ul>

    </main>

    <!-- MENU MOBILE -->
    <nav class="bottom-nav">

        <button class="nav-btn ativo">
            🏠
            <span>Início</span>
        </button>

        <button class="nav-btn">
            📊
            <span>Relatórios</span>
        </button>

        <button class="nav-btn">
            ☁️
            <span>Sync</span>
        </button>

        <button class="nav-btn">
            ⚙️
            <span>Config</span>
        </button>

    </nav>

    <!-- BOTÃO FLUTUANTE -->
    <button
        class="fab"
        onclick="cadastrarMatrizRapido()">

        +

    </button>

    <!-- SERVICE WORKER -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>

    <!-- APP -->
    <script src="./assets/js/app.js"></script>

</body>
</html>
