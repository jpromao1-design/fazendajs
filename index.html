<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FazendaJS</title>

    <meta name="theme-color" content="#16a34a">

    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100 text-gray-900 font-sans min-h-screen transition-colors">

    <div id="toast"></div>

    <datalist id="opcoesLotes"></datalist>

    <header class="app-header bg-jsgreen-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <div class="flex items-center">
            <h1 class="text-2xl font-black flex items-center gap-2">
                <i class="fa-solid fa-cow"></i>
                Fazenda JS
                <span class="text-sm font-normal opacity-70">v11</span>
            </h1>
        </div>

        <div class="flex gap-3">
            <button onclick="alternarTema()" class="header-btn">
                <i class="fa-solid fa-moon"></i>
            </button>

            <button onclick="exportarBackup()" class="header-btn">
                <i class="fa-solid fa-download"></i>
            </button>

            <button onclick="gerarPDFGeral()" class="header-btn bg-white text-black">
                <i class="fa-solid fa-file-pdf"></i> PDF
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">

        <section class="glass-card p-6 mb-6">
            <h2 class="text-3xl font-black text-center mb-6">
                Buscar ou Cadastrar Matriz
            </h2>

            <input
                type="text"
                id="buscaBrinco"
                oninput="onBuscaInput()"
                class="input-app"
                placeholder="DIGITE O NÚMERO OU NOME..."
            >

            <button
                id="btnCadastrarNovo"
                onclick="cadastrarMatrizRapido()"
                class="btn-app-green mt-5"
            >
                <i class="fa-solid fa-plus"></i>
                Cadastrar Matriz
            </button>
        </section>

        <section class="glass-card p-4 mb-6">
            <label class="font-bold block mb-2">
                Filtrar por lote
            </label>

            <div class="flex gap-3">
                <select id="filtroLote" onchange="filtrarMatrizes()" class="input-app">
                    <option value="">Todos os lotes</option>
                </select>

                <button onclick="limparFiltros()" class="btn-app-gray">
                    Limpar
                </button>
            </div>
        </section>

        <div id="resumoPlantel" class="grid grid-cols-3 gap-4 mb-6"></div>

        <ul id="listaContatos" class="space-y-4"></ul>

    </main>

    <script src="assets/js/app.js"></script>

</body>
</html>
